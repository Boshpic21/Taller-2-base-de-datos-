<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda del día</title>
  <link rel="stylesheet" href="/static/estilos.css">
</head>
<body>

  <header class="barra-superior">
    <span class="hamburguesa">&#9776;</span>
    <div class="barra-derecha">
      <span id="nombre-usuario">Lic. Juan Pérez</span>
      <a href="/" class="salir" onclick="sessionStorage.clear()">Salir</a>
    </div>
  </header>

  <div class="contenedor">

    <nav class="menu-lateral">
      <a href="/dashboard" class="item-menu">Inicio</a>
      <span class="item-menu">Expedientes</span>
      <hr>
      <span class="item-menu">Reportes</span>
      <hr>
      <p class="titulo-config">Configuración</p>
      <span class="item-menu sub">Aseguradora</span>
      <span class="item-menu sub">Usuarios</span>
      <span class="item-menu sub">Juzgado</span>
    </nav>

    <main class="principal">

      <div class="zona-agenda">
        <div class="columna-agenda">
          <h1 class="titulo-agenda">Agenda del día</h1>
          <h2 id="fecha-hoy" class="subtitulo-fecha"></h2>

          <table class="tabla-agenda">
            <thead>
              <tr>
                <th>ASEGURADORA</th>
                <th>CLIENTE</th>
                <th>JUZGADO</th>
              </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
          </table>

          <div class="contadores">
            <div class="contador pendientes">
              <div><p>Pendientes</p><h2 id="total-pendiente">0</h2></div>
            </div>
            <div class="contador en-curso">
              <div><p>En curso</p><h2 id="total-en_curso">0</h2></div>
            </div>
            <div class="contador cerrados">
              <div><p>Cerrados</p><h2 id="total-cerrado">0</h2></div>
            </div>
          </div>
        </div>

        <div class="calendario" id="calendario"></div>
      </div>

    </main>
  </div>

  <button class="boton-mas" onclick="abrirModal()">+</button>

  <div class="fondo-modal" id="modal">
    <div class="modal">
      <h3>Nuevo Expediente</h3>
      <input type="text" id="nuevo-cliente" placeholder="Nombre del cliente">
      <select id="nueva-aseguradora"></select>
      <select id="nuevo-juzgado"></select>
      <select id="nuevo-estado">
        <option value="pendiente">Pendiente</option>
        <option value="en_curso">En curso</option>
        <option value="cerrado">Cerrado</option>
      </select>
      <input type="date" id="nueva-fecha">
      <div class="botones-modal">
        <button class="boton-cancelar" onclick="cerrarModal()">Cancelar</button>
        <button class="boton-guardar" onclick="guardarExpediente()">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const nombre = sessionStorage.getItem("nombre");
    if (nombre) document.getElementById("nombre-usuario").textContent = "Lic. " + nombre;

    const hoy = new Date();
    const opciones = { weekday: "long", day: "numeric", month: "long", year: "numeric" };
    let fechaTexto = hoy.toLocaleDateString("es-PA", opciones);
    fechaTexto = fechaTexto.charAt(0).toUpperCase() + fechaTexto.slice(1);
    document.getElementById("fecha-hoy").textContent = fechaTexto;

    async function cargarAgenda() {
      const r = await fetch("/api/expedientes");
      const expedientes = await r.json();
      const cuerpo = document.getElementById("cuerpo-tabla");
      cuerpo.innerHTML = "";
      expedientes.forEach(e => {
        cuerpo.innerHTML += `
          <tr>
            <td>${e.aseguradora}</td>
            <td>${e.cliente}</td>
            <td>${e.juzgado}</td>
          </tr>`;
      });
    }

    async function cargarContadores() {
      const r = await fetch("/api/dashboard");
      const datos = await r.json();
      ["pendiente", "en_curso", "cerrado"].forEach(est => {
        document.getElementById("total-" + est).textContent = "0";
      });
      datos.forEach(d => {
        const elemento = document.getElementById("total-" + d.estado);
        if (elemento) elemento.textContent = d.total;
      });
    }

    function dibujarCalendario() {
      const meses = ["January","February","March","April","May","June",
                     "July","August","September","October","November","December"];
      const anio = hoy.getFullYear();
      const mes = hoy.getMonth();
      const primerDia = new Date(anio, mes, 1).getDay();
      const diasEnMes = new Date(anio, mes + 1, 0).getDate();

      let html = `<div class="cal-cabecera">
                    <span>&lsaquo;</span>
                    <strong>${meses[mes]} ${anio}</strong>
                    <span>&rsaquo;</span>
                  </div>
                  <div class="cal-dias">
                    <span class="cal-nombre">S</span><span class="cal-nombre">M</span>
                    <span class="cal-nombre">T</span><span class="cal-nombre">W</span>
                    <span class="cal-nombre">T</span><span class="cal-nombre">F</span>
                    <span class="cal-nombre">S</span>`;

      for (let i = 0; i < primerDia; i++) html += "<span></span>";
      for (let d = 1; d <= diasEnMes; d++) {
        const clase = (d === hoy.getDate()) ? "cal-hoy" : "";
        html += `<span class="${clase}">${d}</span>`;
      }
      html += "</div>";
      document.getElementById("calendario").innerHTML = html;
    }

    async function abrirModal() {
      const [rA, rJ] = await Promise.all([
        fetch("/api/aseguradoras"),
        fetch("/api/juzgados")
      ]);
      const aseguradoras = await rA.json();
      const juzgados = await rJ.json();

      document.getElementById("nueva-aseguradora").innerHTML =
        aseguradoras.map(a => `<option value="${a.id}">${a.nombre}</option>`).join("");
      document.getElementById("nuevo-juzgado").innerHTML =
        juzgados.map(j => `<option value="${j.id}">${j.nombre}</option>`).join("");

      document.getElementById("modal").style.display = "flex";
    }

    function cerrarModal() {
      document.getElementById("modal").style.display = "none";
    }

    async function guardarExpediente() {
      const cuerpo = {
        cliente: document.getElementById("nuevo-cliente").value,
        aseguradora_id: parseInt(document.getElementById("nueva-aseguradora").value),
        juzgado_id: parseInt(document.getElementById("nuevo-juzgado").value),
        estado: document.getElementById("nuevo-estado").value,
        fecha_audiencia: document.getElementById("nueva-fecha").value || null
      };

      const r = await fetch("/api/expedientes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(cuerpo)
      });

      if (r.ok) {
        cerrarModal();
        document.getElementById("nuevo-cliente").value = "";
        cargarAgenda();
        cargarContadores();
      } else {
        alert("Faltan datos del expediente");
      }
    }

    cargarAgenda();
    cargarContadores();
    dibujarCalendario();
  </script>
</body>
</html>
